<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-screen" id="login-screen">
    <form class="login-card" id="login-form">
      <h1>Личный кабинет</h1>
      <p>Введите пароль для входа</p>
      <input type="password" id="login-password" placeholder="Пароль" required autocomplete="current-password">
      <button type="submit">Войти</button>
      <p class="login-hint">Пароль задаётся в настройках редактора</p>
      <p class="login-hint"><strong>Важно:</strong> запускайте сайт командой <code>python3 server.py</code></p>
      <a href="../index.html">← На сайт</a>
    </form>
  </div>

  <div class="admin-app hidden" id="admin-app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <strong>Личный кабинет</strong>
        <a href="../index.html" target="_blank">Открыть сайт ↗</a>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <p class="nav-section">Клиенты</p>
        <button type="button" data-tab="requests" class="nav-item active">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="nav-label">Заявки</span>
          <span class="nav-badge hidden" id="requests-badge">0</span>
        </button>
        <button type="button" data-tab="booking" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </span>
          <span class="nav-label">Календарь</span>
        </button>

        <p class="nav-section">Сайт</p>
        <button type="button" data-tab="site" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </span>
          <span class="nav-label">Основное</span>
        </button>
        <button type="button" data-tab="portfolio" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          </span>
          <span class="nav-label">Портфолио</span>
        </button>
        <button type="button" data-tab="moodboards" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </span>
          <span class="nav-label">Идеи съёмок</span>
        </button>
        <button type="button" data-tab="services" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </span>
          <span class="nav-label">Услуги</span>
        </button>
        <button type="button" data-tab="reviews" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="nav-label">Отзывы</span>
        </button>
        <button type="button" data-tab="contacts" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <span class="nav-label">Контакты</span>
        </button>
        <button type="button" data-tab="publish" class="nav-item">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </span>
          <span class="nav-label">Публикация</span>
        </button>
      </nav>
      <button class="logout-btn" id="logout-btn" type="button">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        Выйти
      </button>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div>
          <h1 id="panel-title">Заявки</h1>
          <p class="save-status" id="save-status"></p>
        </div>
        <button class="save-btn hidden" id="save-btn" type="button">Сохранить изменения</button>
      </header>

      <div class="panel active" id="panel-requests"></div>
      <div class="panel" id="panel-site"></div>
      <div class="panel" id="panel-portfolio"></div>
      <div class="panel" id="panel-moodboards"></div>
      <div class="panel" id="panel-services"></div>
      <div class="panel" id="panel-reviews"></div>
      <div class="panel" id="panel-contacts"></div>
      <div class="panel" id="panel-booking"></div>
      <div class="panel" id="panel-publish"></div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="admin.js"></script>
</body>
</html>
